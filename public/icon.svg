<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Background crimson circle -->
  <circle cx="250" cy="250" r="242" fill="#c20e24" />
  
  <!-- Outer thin white ring -->
  <circle cx="250" cy="250" r="234" fill="none" stroke="#ffffff" stroke-width="5" />
  
  <!-- Sweeping design lines in white -->
  <path d="M 100 350 C 130 420, 220 460, 290 460 C 370 460, 430 420, 450 370 C 400 420, 320 440, 250 440 C 180 440, 120 410, 100 350 Z" fill="#ffffff" opacity="0.9" />
  <path d="M 150 350 C 180 410, 240 430, 280 430 C 330 430, 380 410, 410 370 C 380 400, 320 415, 270 415 C 210 415, 170 390, 150 350 Z" fill="#ffffff" opacity="0.8" />

  <!-- The stylized leaf-book shape on the left with text "HỚN QUẢN" -->
  <!-- Outline of the leaf -->
  <path d="M 60 180 C 130 180, 220 200, 270 260 L 260 272 C 210 215, 130 195, 60 195 Z" fill="#ffffff" />
  <!-- Main white body of the leaf/book page -->
  <path d="M 60 180 C 135 180, 215 210, 260 270 L 260 360 C 200 310, 140 310, 95 355 C 80 340, 75 300, 70 280 L 105 281 L 60 180 Z" fill="#ffffff" />
  <path d="M 60 180 C 130 180, 203 205, 243 258 L 243 338 C 190 295, 135 295, 95 330 C 80 310, 75 290, 70 280 Z" fill="#ffffff" />
  
  <!-- Text: HỚN QUẢN -->
  <text x="145" y="318" font-family="'Inter', 'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="39" font-stretch="condensed" fill="#c20e24" text-anchor="middle" letter-spacing="-1">HỚN QUẢN</text>

  <!-- Victory Monument of Hớn Quản (Silhouette) on the right -->
  <!-- Monument Pedestal -->
  <path d="M 270 240 L 270 460 L 292 460 L 292 240 Z" fill="#ffffff" />
  <path d="M 292 250 L 292 460 L 305 460 L 305 250 Z" fill="#c20e24" />
  <path d="M 305 264 L 305 460 L 325 460 L 325 264 Z" fill="#ffffff" />
  <path d="M 325 275 L 325 460 L 340 450 L 340 275 Z" fill="#ffffff" />
  <path d="M 270 240 L 260 252 L 260 275 C 280 295, 290 320, 292 345 Z" fill="#ffffff" />
  
  <path d="M 340 275 C 380 260, 420 230, 470 230 C 430 243, 390 265, 340 285 Z" fill="#ffffff" />

  <!-- Upper blocks/details of pedestal -->
  <rect x="294" y="222" width="22" height="15" fill="#ffffff" />
  <rect x="270" y="210" width="46" height="15" fill="#ffffff" />
  <polygon points="268,210 275,195 305,195 312,210" fill="#ffffff" />

  <!-- Three Standing Figures Silhouette -->
  <!-- Figure 1 (Left): Kneeling/leaning forward soldier with rifle -->
  <path d="M 275 195 C 275 185, 280 180, 288 170 L 295 170 C 295 175, 292 185, 292 195 Z" fill="#ffffff" />
  <path d="M 273 162 C 273 158, 277 155, 282 155 C 285 158, 288 162, 285 168 C 282 168, 275 166, 273 162 Z" fill="#ffffff" />
  <!-- Arm pointing forward -->
  <path d="M 273 162 L 265 172 L 255 178 L 260 182 L 270 174 Z" fill="#ffffff" />
  
  <!-- Figure 2 (Center): Standing soldier with gun high up -->
  <!-- Legs and torso -->
  <path d="M 290 195 L 310 195 L 305 130 L 285 130 Z" fill="#ffffff" />
  <path d="M 292 120 C 292 110, 310 110, 310 120 C 310 128, 292 128, 292 120 Z" fill="#ffffff" />
  <!-- Helmet -->
  <path d="M 290 115 C 290 102, 312 102, 312 115 Z" fill="#ffffff" />
  <!-- Raising high-powered rifle / flag arm -->
  <path d="M 292 135 L 280 90 L 290 70 L 302 128" fill="#ffffff" />
  <!-- Rifle silhouette -->
  <path d="M 278 100 L 284 62 L 290 64 L 282 100 Z" fill="#ffffff" />
  <path d="M 284 58 L 286 42 L 288 42 L 286 58 Z" fill="#ffffff" />
  <!-- Arm pointing right -->
  <path d="M 305 130 L 325 115 L 355 98 L 362 105 L 330 125 Z" fill="#ffffff" />

  <!-- Figure 3 (Right): Female/Worker with gun/flag leaning back -->
  <path d="M 305 195 C 312 190, 320 178, 318 160 L 326 150 C 330 162, 325 185, 315 195 Z" fill="#ffffff" />
  <!-- Head/Hair -->
  <path d="M 312 145 C 312 138, 322 138, 322 145 C 322 150, 312 150, 312 145 Z" fill="#ffffff" />
  <!-- Gun silhouette -->
  <path d="M 318 160 L 335 142 L 348 135 L 345 130 L 330 142 Z" fill="#ffffff" />
</svg>
